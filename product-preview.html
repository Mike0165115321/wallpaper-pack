<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WangLin Mountain — Product Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a10;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:sans-serif
}
.mockup{
  width:800px;
  background:linear-gradient(135deg,#14141e,#1a1a2e);
  border-radius:24px;
  padding:32px;
  box-shadow:0 20px 80px rgba(0,0,0,0.5)
}
.screen{
  aspect-ratio:16/9;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  background:#1a1a2e;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.05)
}
.screen img{
  width:100%;height:100%;
  object-fit:cover
}
.fallback-preview{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0d0d1a 0%,#1a1a2e 30%,#16213e 60%,#0f3460 100%);
  color:rgba(255,255,255,0.05);
  font-size:120px;
  font-weight:100;
  letter-spacing:20px
}
.info{
  display:flex;
  justify-content:space-between;
  align-items:flex-start
}
.left h1{
  font-weight:300;
  font-size:28px;
  letter-spacing:4px;
  color:#fff;
  margin-bottom:4px
}
.left .sub{
  font-weight:200;
  font-size:13px;
  color:rgba(255,255,255,0.25);
  letter-spacing:2px
}
.left .sub span{
  display:inline-block;
  background:rgba(255,255,255,0.04);
  padding:2px 10px;
  border-radius:12px;
  font-size:11px;
  margin-top:8px
}
.right{
  text-align:right
}
.right .price{
  font-weight:200;
  font-size:36px;
  color:#fff;
  letter-spacing:2px
}
.right .badge{
  font-weight:200;
  font-size:11px;
  color:rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.03);
  padding:4px 12px;
  border-radius:20px;
  display:inline-block;
  margin-top:4px
}
.features{
  display:flex;
  gap:12px;
  margin-top:16px;
  flex-wrap:wrap
}
.features span{
  font-weight:200;
  font-size:11px;
  color:rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.03);
  padding:4px 14px;
  border-radius:20px;
  letter-spacing:1px
}
.note{
  text-align:center;
  margin-top:24px;
  font-size:11px;
  color:rgba(255,255,255,0.05);
  letter-spacing:2px
}
</style>
</head>
<body>

<div class="mockup">
  <div class="screen">
    <div class="fallback-preview">00:00</div>
  </div>

  <div class="info">
    <div class="left">
      <h1>WangLin Mountain</h1>
      <div class="sub">
        Minimalist HTML Desktop Wallpaper<br>
        <span>v1.0</span>
      </div>
    </div>
    <div class="right">
      <div class="price">$2.99</div>
      <div class="badge">Digital Download</div>
    </div>
  </div>

  <div class="features">
    <span>🖱️ Mouse Parallax</span>
    <span>📅 Thai Calendar</span>
    <span>⏰ Live Clock</span>
    <span>🌫️ Particle Network</span>
    <span>🌄 4K Ready</span>
  </div>

  <div class="note">mikedev · wallpaper pack</div>
</div>

</body>
</html>
