<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WangLin · สายฟ้ากระบี่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;200;300;400;500;600&family=Noto+Serif+Thai:wght@200;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Sarabun','Noto Sans Thai',sans-serif;
  background:#060e0a;
  user-select:none;
  -webkit-font-smoothing:antialiased
}

/* === BG === */
.bg-wrap{
  position:fixed;inset:0;
  animation:bgBreath 20s ease-in-out infinite alternate
}
@keyframes bgBreath{
  0%{transform:scale(1)}
  100%{transform:scale(1.03)}
}
.bg{
  position:absolute;inset:0;
  background:url('สวยงาม.png') center/cover no-repeat;
  filter:brightness(0.55) saturate(1.2) contrast(1.05) hue-rotate(5deg);
  will-change:transform;
  transition:transform 0.8s cubic-bezier(0.16,1,0.3,1)
}
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:
    linear-gradient(180deg, rgba(2,10,6,0.50) 0%, transparent 20%, transparent 75%, rgba(2,8,4,0.60) 100%),
    radial-gradient(ellipse 70% 70% at 50% 50%, transparent 20%, rgba(2,10,5,0.45) 100%);
  pointer-events:none
}

/* === Mist === */
.mist{
  position:fixed;inset:0;z-index:2;
  pointer-events:none;
  background:
    radial-gradient(ellipse 100% 30% at 15% 55%, rgba(20,60,40,0.03) 0%, transparent 70%),
    radial-gradient(ellipse 70% 25% at 85% 45%, rgba(30,70,50,0.02) 0%, transparent 70%);
  animation:mistDrift 45s ease-in-out infinite alternate;
  will-change:transform,opacity
}
@keyframes mistDrift{
  0%{transform:translate(-3%,0);opacity:0.5}
  50%{opacity:0.7}
  100%{transform:translate(3%,1%);opacity:0.4}
}
@media(prefers-reduced-motion:reduce){.mist{animation:none}}

/* === Lightning flash === */
.lightning{
  position:fixed;inset:0;z-index:2;
  pointer-events:none;opacity:0;
  background:
    radial-gradient(ellipse 30% 60% at 70% 15%, rgba(80,255,180,0.015) 0%, transparent 100%);
  animation:lFlash 10s ease-in-out infinite
}
@keyframes lFlash{
  0%,92%,95%,97%,100%{opacity:0}
  93%{opacity:0.3}
  94%{opacity:0}
  96%{opacity:0.15}
  98%{opacity:0}
}
@media(prefers-reduced-motion:reduce){.lightning{display:none}}

/* === Stars (jade tinted) === */
.stars{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(150,220,190,0.5), transparent),
    radial-gradient(1px 1px at 30% 70%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(170,240,210,0.6), transparent),
    radial-gradient(1px 1px at 70% 30%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 90% 60%, rgba(170,240,210,0.4), transparent),
    radial-gradient(1.5px 1.5px at 20% 88%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 45% 45%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 78% 82%, rgba(170,240,210,0.4), transparent);
  animation:twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle{
  0%{opacity:0.3}
  100%{opacity:0.8}
}
@media(prefers-reduced-motion:reduce){.stars{animation:none;opacity:0.6}}

/* === Main container — center layout like wanglin-mountain === */
.main{
  position:fixed;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  pointer-events:none;
  padding:clamp(20px,5vh,60px);
  gap:clamp(16px,5vh,48px)
}

/* === Clock === */
.clock-panel{
  text-align:center;
  pointer-events:none
}
.clock{
  font-size:clamp(40px,min(12vh,10vw),96px);
  font-weight:100;
  color:rgba(235,245,240,0.92);
  letter-spacing:clamp(4px,1.5vw,10px);
  font-variant-numeric:tabular-nums;
  line-height:1;
  font-family:'Noto Serif Thai','Sarabun',serif;
  text-shadow:0 0 60px rgba(0,0,0,0.15), 0 2px 30px rgba(0,0,0,0.5)
}
.clock .sep{opacity:0.25;margin:0 clamp(2px,0.3vw,6px)}
.sec-line{
  font-size:clamp(16px,3vh,28px);
  font-weight:300;
  color:rgba(220,240,230,0.55);
  letter-spacing:6px;
  font-variant-numeric:tabular-nums;
  line-height:1;
  margin-top:clamp(6px,0.8vh,12px)
}
.rule{
  width:clamp(28px,4vw,44px);height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,220,200,0.15),transparent);
  margin:clamp(12px,1.8vh,18px) auto clamp(10px,1.2vh,14px)
}
.date-line{
  font-size:clamp(13px,2vh,18px);
  font-weight:400;
  color:rgba(210,230,220,0.65);
  letter-spacing:2px;
  font-family:'Noto Serif Thai','Sarabun',serif;
  text-shadow:0 1px 15px rgba(0,0,0,0.5)
}
.date-line .num{font-weight:600;color:rgba(230,245,235,0.85)}

/* === Calendar === */
.cal-wrap{
  pointer-events:none
}
.cal-panel{
  background:rgba(8,18,12,0.50);
  backdrop-filter:blur(16px) saturate(1.1);
  -webkit-backdrop-filter:blur(16px) saturate(1.1);
  border-radius:14px;
  border:1px solid rgba(100,200,150,0.06);
  padding:clamp(10px,1.5vh,18px) clamp(16px,2.5vw,28px);
  box-shadow:0 4px 40px rgba(0,0,0,0.18)
}
.cal-header{
  font-size:clamp(12px,1.6vh,15px);
  font-weight:500;
  color:rgba(200,230,215,0.55);
  letter-spacing:2px;
  margin-bottom:clamp(5px,0.6vh,8px);
  text-align:center
}
.cal-header .cal-year{
  font-weight:300;
  color:rgba(200,230,215,0.25);
  font-size:clamp(10px,1.3vh,13px);
  margin-left:4px
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:2px
}
.cal-dow{
  font-size:clamp(9px,1.2vh,12px);
  font-weight:500;
  color:rgba(200,230,215,0.30);
  text-align:center;
  padding:0 0 clamp(4px,0.5vh,6px) 0
}
.cal-day{
  font-size:clamp(11px,1.5vh,14px);
  font-weight:400;
  color:rgba(200,230,215,0.45);
  text-align:center;
  padding:3px;
  line-height:1.4;
  width:clamp(24px,3.2vh,32px);
  height:clamp(24px,3.2vh,32px);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;
  border-radius:6px
}
.cal-day.other{color:rgba(200,230,215,0.07)}
.cal-day.today{
  color:rgba(235,250,240,0.90);
  font-weight:600;
  background:rgba(80,200,140,0.12);
  border:1px solid rgba(80,200,140,0.15)
}

/* === Brand === */
.brand{
  position:fixed;z-index:5;pointer-events:none;
  bottom:clamp(6px,0.8vh,10px);right:clamp(12px,1.8vw,20px);
  font-size:clamp(5px,0.7vh,7px);
  font-weight:200;color:rgba(160,220,190,0.03);
  letter-spacing:clamp(10px,2vw,20px);
  text-transform:uppercase;text-wrap:nowrap
}

/* === Particles canvas === */
#particles{
  position:fixed;inset:0;z-index:3;
  pointer-events:none
}
#network{
  position:fixed;inset:0;z-index:2;
  pointer-events:none
}

/* === Reduced motion === */
@media(prefers-reduced-motion:reduce){
  .bg-wrap{animation:none}
  .bg{filter:brightness(0.6) saturate(1.05)}
  .stars{animation:none}
  .mist{animation:none}
  .lightning{display:none}
  #network{display:none}
}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg" id="sceneBg"></div>
</div>
<div class="bg-overlay"></div>
<div class="stars"></div>
<div class="mist"></div>
<div class="lightning"></div>
<canvas id="network"></canvas>
<canvas id="particles"></canvas>

<div class="main">
  <div class="clock-panel">
    <div class="clock" aria-live="polite">
      <span id="clockH">00</span><span class="sep">:</span><span id="clockM">00</span>
    </div>
    <div class="sec-line"><span id="clockS">00</span></div>
    <div class="rule"></div>
    <div class="date-line" id="dateDisplay">---</div>
  </div>


  <div class="cal-wrap">
    <div class="cal-panel">
      <div id="calendar"></div>
    </div>
  </div>
</div>

<div class="brand">WANGLIN · 望林</div>

<script>
(function(){
  'use strict';
  const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)');
  if (prefersReduced.matches) return;

  // ==================== CLOCK + CALENDAR ====================
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                  'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const dow    = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  const $ = id => document.getElementById(id);
  let pm=-1,ph=-1;

  function renderCal(){
    const n=new Date(),y=n.getFullYear(),m=n.getMonth(),td=n.getDate();
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
    let h='<div class="cal-header">'+months[m]+' <span class="cal-year">'+(y+543)+'</span></div><div class="cal-grid">';
    for(let d=0;d<7;d++)h+='<div class="cal-dow">'+dow[d]+'</div>';
    for(let d=dip-fd+1;d<=dip;d++)h+='<div class="cal-day other">'+d+'</div>';
    for(let d=1;d<=dim;d++)h+='<div class="cal-day'+(d===td?' today':'')+'">'+d+'</div>';
    const t=fd+dim;if(t%7>0)for(let d=1;d<=7-t%7;d++)h+='<div class="cal-day other">'+d+'</div>';
    h+='</div>';
    $('calendar').innerHTML=h;
  }

  function updateClock(){
    const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
    const hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0'),ss=String(s).padStart(2,'0');
    if(h!==ph||m!==pm){
      $('clockH').textContent=hh;
      $('clockM').textContent=mm;
      $('dateDisplay').innerHTML='<span class="num">'+days[n.getDay()]+'</span>ที่ <span class="num">'+n.getDate()+'</span> '+months[n.getMonth()]+' <span class="num">'+(n.getFullYear()+543)+'</span>';
      renderCal();
      ph=h;pm=m;
    }
    $('clockS').textContent=ss;
  }

  renderCal();
  updateClock();
  setInterval(updateClock,500);

  // ==================== MOUSE TRACKING ====================
  let mx = window.innerWidth / 2;
  let my = window.innerHeight / 2;

  // Parallax background
  const bg = document.getElementById('sceneBg');
  let bgIdleTimer;

  document.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;

    const px = (e.clientX / window.innerWidth - 0.5) * 20;
    const py = (e.clientY / window.innerHeight - 0.5) * 14;
    bg.style.transform = `translate(${px}px,${py}px) scale(1.04)`;

    clearTimeout(bgIdleTimer);
    bgIdleTimer = setTimeout(() => {
      bg.style.transform = `scale(1.04)`;
    }, 3000);
  }, { passive: true });

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

  // ==================== PARTICLES (spiritual energy) ====================
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PARTICLE_COUNT = 50;
  const particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -(0.04 + Math.random() * 0.15),
      r: 1 + Math.random() * 2.5,
      alpha: 0.08 + Math.random() * 0.25,
      phase: Math.random() * Math.PI * 2,
      hue: 120 + Math.random() * 60
    });
  }

  // ==================== LIGHTNING BOLTS ====================
  const bolts = [];

  function spawnLightning(){
    if (Math.random() > 0.35) return;
    const x = Math.random() * W;
    const y = Math.random() * H * 0.2;
    const segments = 6 + Math.floor(Math.random() * 10);
    const points = [{x, y}];
    let cx = x, cy = y;
    for (let i = 0; i < segments; i++) {
      cx += (Math.random() - 0.5) * 50;
      cy += 15 + Math.random() * 30;
      points.push({x: cx, y: cy});
    }
    bolts.push({
      points,
      alpha: 0.12 + Math.random() * 0.18,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.025
    });
  }

  setInterval(spawnLightning, 2500);

  // ==================== NETWORK GRAPH — living energy constellation ====================
  const nCanvas = document.getElementById('network');
  const nCtx = nCanvas.getContext('2d');
  let nW, nH;
  let nmx = -9999, nmy = -9999; // mouse for network interaction

  function nResize(){
    nW = nCanvas.width = window.innerWidth;
    nH = nCanvas.height = window.innerHeight;
  }
  nResize();
  window.addEventListener('resize', nResize);

  // Track mouse for network interaction
  document.addEventListener('mousemove', e => { nmx = e.clientX; nmy = e.clientY; }, { passive: true });

  const NODE_COUNT = 30;
  const nodes = [];
  const MAX_CONNECT = 350; // max connection distance

  for (let i = 0; i < NODE_COUNT; i++) {
    const isHub = Math.random() > 0.7; // 30% are hub nodes
    nodes.push({
      x: Math.random() * nW,
      y: Math.random() * nH,
      vx: (Math.random() - 0.5) * 0.1,
      vy: (Math.random() - 0.5) * 0.1,
      r: isHub ? 2.5 + Math.random() * 2 : 1.2 + Math.random() * 1.5,
      alpha: isHub ? 0.12 + Math.random() * 0.08 : 0.04 + Math.random() * 0.06,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.3 + Math.random() * 0.8,
      isHub,
      // Energy pulses traveling along connections
      energyPhase: Math.random() * Math.PI * 2,
      energySpeed: 0.2 + Math.random() * 0.4,
      connections: []
    });
  }

  // Build connections based on proximity
  function buildConnections(){
    for (let i = 0; i < nodes.length; i++) {
      nodes[i].connections = [];
      const dists = [];
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < MAX_CONNECT) {
          dists.push({ idx: j, dist });
        }
      }
      dists.sort((a, b) => a.dist - b.dist);
      // Hubs connect to more nodes
      const maxConns = nodes[i].isHub ? 4 + Math.floor(Math.random() * 3) : 1 + Math.floor(Math.random() * 3);
      nodes[i].connections = dists.slice(0, Math.min(maxConns, dists.length)).map(d => d.idx);
    }
  }
  buildConnections();

  // Rebuild connections occasionally as nodes move
  let rebuildTimer = 0;

  function drawNetwork(){
    nCtx.clearRect(0, 0, nW, nH);
    const now = Date.now() * 0.001;

    // Rebuild connections every ~10 seconds
    rebuildTimer++;
    if (rebuildTimer > 600) { buildConnections(); rebuildTimer = 0; }

    // --- Update nodes with spring physics ---
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];

      // Spring attraction to connected nodes
      for (const j of a.connections) {
        const b = nodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const idealDist = 120 + Math.random() * 80; // each connection has natural length
        const force = (dist - idealDist) * 0.00008;
        a.vx += (dx / dist) * force;
        a.vy += (dy / dist) * force;
      }

      // Gentle random drift
      a.vx += (Math.random() - 0.5) * 0.008;
      a.vy += (Math.random() - 0.5) * 0.008;

      // Mouse repulsion
      if (nmx > 0) {
        const dx = a.x - nmx;
        const dy = a.y - nmy;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        if (dist < 120) {
          const force = (1 - dist / 120) * 0.06;
          a.vx += (dx / dist) * force;
          a.vy += (dy / dist) * force;
        }
      }

      // Dampening
      a.vx *= 0.98;
      a.vy *= 0.98;

      // Speed limit
      const spd = Math.sqrt(a.vx*a.vx + a.vy*a.vy);
      if (spd > 0.5) { a.vx = (a.vx/spd)*0.5; a.vy = (a.vy/spd)*0.5; }

      a.x += a.vx;
      a.y += a.vy;

      // Wrap
      if (a.x < -30) a.x = nW + 30;
      if (a.x > nW + 30) a.x = -30;
      if (a.y < -30) a.y = nH + 30;
      if (a.y > nH + 30) a.y = -30;
    }

    // --- Draw connections with energy flow ---
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (const j of a.connections) {
        const b = nodes[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist >= MAX_CONNECT) continue;

        // Base line — very subtle
        const distFactor = 1 - dist / MAX_CONNECT;
        const baseAlpha = distFactor * 0.04;

        nCtx.beginPath();
        nCtx.moveTo(a.x, a.y);
        nCtx.lineTo(b.x, b.y);
        nCtx.strokeStyle = `rgba(80, 210, 170, ${baseAlpha})`;
        nCtx.lineWidth = 0.4;
        nCtx.stroke();

        // Mouse glow — lines near mouse pulse brighter
        let mouseGlow = 0;
        if (nmx > 0) {
          const midX = (a.x + b.x) / 2;
          const midY = (a.y + b.y) / 2;
          const md = Math.sqrt((midX - nmx)**2 + (midY - nmy)**2);
          if (md < 200) mouseGlow = (1 - md / 200) * 0.6;
        }

        // Energy pulse traveling along connection
        if (mouseGlow > 0.05 || Math.random() < 0.03) {
          // Pulse position oscillates along the line
          const pulsePos = (Math.sin(now * a.energySpeed + a.energyPhase + j * 0.5) + 1) / 2;
          const px = a.x + (b.x - a.x) * pulsePos;
          const py = a.y + (b.y - a.y) * pulsePos;
          const pulseAlpha = (0.15 + mouseGlow * 0.5) * distFactor;

          nCtx.beginPath();
          nCtx.arc(px, py, 1.2 + mouseGlow * 1.5, 0, Math.PI * 2);
          nCtx.fillStyle = `rgba(120, 240, 200, ${pulseAlpha})`;
          nCtx.fill();
        }

        // Mouse glow line overlay
        if (mouseGlow > 0.05) {
          nCtx.beginPath();
          nCtx.moveTo(a.x, a.y);
          nCtx.lineTo(b.x, b.y);
          nCtx.strokeStyle = `rgba(150, 255, 220, ${mouseGlow * 0.3 * distFactor})`;
          nCtx.lineWidth = 1 + mouseGlow * 2;
          nCtx.stroke();
        }
      }
    }

    // --- Draw nodes ---
    for (const node of nodes) {
      const pulse = 0.6 + 0.4 * Math.sin(now * node.pulseSpeed + node.pulse);
      const r = node.r * pulse;
      const a = node.alpha * pulse;

      // Mouse proximity glow
      let mGlow = 0;
      if (nmx > 0) {
        const md = Math.sqrt((node.x - nmx)**2 + (node.y - nmy)**2);
        if (md < 150) mGlow = (1 - md / 150) * 0.3;
      }

      // Outer glow (bigger for hubs & mouse-near)
      nCtx.beginPath();
      nCtx.arc(node.x, node.y, (node.isHub ? 6 : 3) + mGlow * 8, 0, Math.PI * 2);
      nCtx.fillStyle = `rgba(80, 220, 170, ${a * 0.06 + mGlow * 0.04})`;
      nCtx.fill();

      // Core
      nCtx.beginPath();
      nCtx.arc(node.x, node.y, r * (0.6 + mGlow), 0, Math.PI * 2);
      nCtx.fillStyle = `rgba(${160 + mGlow * 60}, ${240 + mGlow * 15}, ${210 + mGlow * 30}, ${a + mGlow * 0.3})`;
      nCtx.fill();
    }

    requestAnimationFrame(drawNetwork);
  }
  drawNetwork();

  function drawScene(){
    ctx.clearRect(0, 0, W, H);

    // Draw particles
    for (const p of particles) {
      p.vy = lerp(p.vy, -(0.04 + p.r * 0.03), 0.01);
      p.vx += Math.sin(Date.now() * 0.001 + p.phase) * 0.002;

      p.x += p.vx;
      p.y += p.vy;

      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;

      if (mx !== undefined) {
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 80 && d > 0) {
          const force = (1 - d / 80) * 1.2;
          p.x += (dx / d) * force;
          p.y += (dy / d) * force;
        }
      }

      const flicker = 0.6 + 0.4 * Math.sin(Date.now() * 0.002 + p.phase);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 60%, 65%, ${p.alpha * flicker})`;
      ctx.fill();

      if (p.r > 1.5) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 40%, 55%, ${p.alpha * flicker * 0.05})`;
        ctx.fill();
      }
    }

    // Draw lightning bolts
    for (let i = bolts.length - 1; i >= 0; i--) {
      const b = bolts[i];
      b.life -= b.decay;
      if (b.life <= 0) { bolts.splice(i, 1); continue; }

      ctx.beginPath();
      ctx.moveTo(b.points[0].x, b.points[0].y);
      for (let j = 1; j < b.points.length; j++) {
        const jx = b.points[j].x + (Math.random() - 0.5) * 3;
        const jy = b.points[j].y + (Math.random() - 0.5) * 3;
        ctx.lineTo(jx, jy);
      }
      ctx.strokeStyle = `rgba(100, 255, 180, ${b.alpha * b.life})`;
      ctx.lineWidth = 1.2 + b.life * 0.5;
      ctx.stroke();

      // Glow
      ctx.beginPath();
      ctx.moveTo(b.points[0].x, b.points[0].y);
      for (let j = 1; j < b.points.length; j++) {
        ctx.lineTo(b.points[j].x, b.points[j].y);
      }
      ctx.strokeStyle = `rgba(60, 220, 150, ${b.alpha * b.life * 0.25})`;
      ctx.lineWidth = 4 + b.life * 3;
      ctx.stroke();
    }

    requestAnimationFrame(drawScene);
  }

  // Start
  drawScene();
})();
</script>
</body>
</html>
