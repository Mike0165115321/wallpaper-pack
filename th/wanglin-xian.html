<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WangLin · สายฟ้ากระบี่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;200;300;400;500;600&family=Noto+Serif+Thai:wght@200;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Sarabun','Noto Sans Thai',sans-serif;
  background:#060e0a;
  user-select:none;
  -webkit-font-smoothing:antialiased
}

/* === BG === */
.bg-wrap{
  position:fixed;inset:0;
  animation:bgBreath 20s ease-in-out infinite alternate
}
@keyframes bgBreath{
  0%{transform:scale(1)}
  100%{transform:scale(1.03)}
}
.bg{
  position:absolute;inset:0;
  background:url('สวยงาม.png') center/cover no-repeat;
  filter:brightness(0.55) saturate(1.2) contrast(1.05) hue-rotate(5deg);
  will-change:transform;
  transition:transform 0.8s cubic-bezier(0.16,1,0.3,1)
}
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:
    linear-gradient(180deg, rgba(2,10,6,0.50) 0%, transparent 20%, transparent 75%, rgba(2,8,4,0.60) 100%),
    radial-gradient(ellipse 70% 70% at 50% 50%, transparent 20%, rgba(2,10,5,0.45) 100%);
  pointer-events:none
}

/* === Mist === */
.mist{
  position:fixed;inset:0;z-index:2;
  pointer-events:none;
  background:
    radial-gradient(ellipse 100% 30% at 15% 55%, rgba(20,60,40,0.03) 0%, transparent 70%),
    radial-gradient(ellipse 70% 25% at 85% 45%, rgba(30,70,50,0.02) 0%, transparent 70%);
  animation:mistDrift 45s ease-in-out infinite alternate;
  will-change:transform,opacity
}
@keyframes mistDrift{
  0%{transform:translate(-3%,0);opacity:0.5}
  50%{opacity:0.7}
  100%{transform:translate(3%,1%);opacity:0.4}
}
@media(prefers-reduced-motion:reduce){.mist{animation:none}}

/* === Lightning flash === */
.lightning{
  position:fixed;inset:0;z-index:2;
  pointer-events:none;opacity:0;
  background:
    radial-gradient(ellipse 30% 60% at 70% 15%, rgba(80,255,180,0.015) 0%, transparent 100%);
  animation:lFlash 10s ease-in-out infinite
}
@keyframes lFlash{
  0%,92%,95%,97%,100%{opacity:0}
  93%{opacity:0.3}
  94%{opacity:0}
  96%{opacity:0.15}
  98%{opacity:0}
}
@media(prefers-reduced-motion:reduce){.lightning{display:none}}

/* === Stars (jade tinted) === */
.stars{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(150,220,190,0.5), transparent),
    radial-gradient(1px 1px at 30% 70%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(170,240,210,0.6), transparent),
    radial-gradient(1px 1px at 70% 30%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 90% 60%, rgba(170,240,210,0.4), transparent),
    radial-gradient(1.5px 1.5px at 20% 88%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 45% 45%, rgba(150,220,190,0.3), transparent),
    radial-gradient(1px 1px at 78% 82%, rgba(170,240,210,0.4), transparent);
  animation:twinkle 6s ease-in-out infinite alternate;
}
@keyframes twinkle{
  0%{opacity:0.3}
  100%{opacity:0.8}
}
@media(prefers-reduced-motion:reduce){.stars{animation:none;opacity:0.6}}

/* === Main container — centers everything === */
.main{
  position:fixed;inset:0;z-index:5;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  pointer-events:none
}

/* === Clock === */
.clock-panel{
  position:fixed;top:clamp(18px,3.5vh,44px);
  left:50%;transform:translateX(-50%);
  z-index:7;text-align:center;
  pointer-events:none
}
.clock{
  font-size:clamp(32px,min(9vh,7vw),72px);
  font-weight:100;
  color:rgba(180,230,200,0.88);
  letter-spacing:clamp(4px,1.5vw,10px);
  font-variant-numeric:tabular-nums;
  line-height:1;
  font-family:'Noto Serif Thai','Sarabun',serif;
  text-shadow:0 0 60px rgba(40,200,130,0.04), 0 1px 20px rgba(0,0,0,0.5)
}
.clock .sep{opacity:0.28;margin:0 clamp(2px,0.3vw,6px)}
.sec-line{
  font-size:clamp(12px,2.2vh,22px);
  font-weight:200;
  color:rgba(160,220,190,0.22);
  letter-spacing:6px;
  font-variant-numeric:tabular-nums;
  line-height:1;
  margin-top:clamp(4px,0.6vh,8px)
}
.rule{
  width:clamp(20px,3.5vw,36px);height:1px;
  background:linear-gradient(90deg,transparent,rgba(60,200,140,0.10),transparent);
  margin:clamp(10px,1.5vh,16px) auto clamp(8px,1vh,12px)
}
.date-line{
  font-size:clamp(11px,1.6vh,15px);
  font-weight:300;
  color:rgba(160,220,190,0.40);
  letter-spacing:2px;
  font-family:'Noto Serif Thai','Sarabun',serif;
  text-shadow:0 1px 10px rgba(0,0,0,0.4)
}
.date-line .num{font-weight:500;color:rgba(190,240,215,0.60)}

/* === Calendar === */
.cal-wrap{
  position:fixed;bottom:clamp(14px,2.5vh,28px);
  left:50%;transform:translateX(-50%);
  z-index:7;pointer-events:none
}
.cal-panel{
  background:rgba(6,16,10,0.45);
  backdrop-filter:blur(12px) saturate(1.1);
  -webkit-backdrop-filter:blur(12px) saturate(1.1);
  border-radius:10px;
  border:1px solid rgba(60,160,110,0.05);
  padding:clamp(6px,1vh,12px) clamp(12px,1.8vw,20px);
  box-shadow:0 4px 30px rgba(0,0,0,0.15)
}
.cal-header{
  font-size:clamp(10px,1.3vh,13px);
  font-weight:400;
  color:rgba(160,220,190,0.35);
  letter-spacing:2px;
  margin-bottom:clamp(3px,0.4vh,6px);
  text-align:center
}
.cal-header .cal-year{
  font-weight:200;
  color:rgba(160,220,190,0.15);
  font-size:clamp(8px,1vh,11px);
  margin-left:3px
}
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:1px
}
.cal-dow{
  font-size:clamp(7px,0.9vh,10px);
  font-weight:400;
  color:rgba(160,220,190,0.13);
  text-align:center;
  padding:0 0 clamp(3px,0.4vh,5px) 0
}
.cal-day{
  font-size:clamp(9px,1.1vh,12px);
  font-weight:300;
  color:rgba(160,220,190,0.25);
  text-align:center;
  padding:2px;
  line-height:1.3;
  width:clamp(18px,2.6vh,26px);
  height:clamp(18px,2.6vh,26px);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;
  border-radius:4px
}
.cal-day.other{color:rgba(160,220,190,0.04)}
.cal-day.today{
  color:rgba(200,245,220,0.75);
  font-weight:600;
  background:rgba(60,180,120,0.07);
  border:1px solid rgba(60,180,120,0.08)
}

/* === Swords container === */
.swords-wrap{
  position:fixed;inset:0;z-index:6;
  pointer-events:none
}
.sword{
  position:absolute;
  width:20px;height:clamp(90px,14vh,130px);
  transform-origin:50% 100%;
  will-change:transform;
  transition:opacity 0.5s
}
.sword svg{
  width:100%;height:100%;
  display:block
}
.sword-glow{
  position:absolute;
  width:20px;height:clamp(90px,14vh,130px);
  top:0;left:0;
  background:linear-gradient(180deg, rgba(40,220,130,0.03) 0%, transparent 100%);
  border-radius:10px;
  pointer-events:none;
  filter:blur(4px)
}

/* === Brand === */
.brand{
  position:fixed;z-index:5;pointer-events:none;
  bottom:clamp(6px,0.8vh,10px);right:clamp(12px,1.8vw,20px);
  font-size:clamp(5px,0.7vh,7px);
  font-weight:200;color:rgba(160,220,190,0.03);
  letter-spacing:clamp(10px,2vw,20px);
  text-transform:uppercase;text-wrap:nowrap
}

/* === Particles canvas === */
#particles{
  position:fixed;inset:0;z-index:3;
  pointer-events:none
}

/* === Reduced motion === */
@media(prefers-reduced-motion:reduce){
  .bg-wrap{animation:none}
  .bg{filter:brightness(0.6) saturate(1.05)}
  .stars{animation:none}
  .mist{animation:none}
  .lightning{display:none}
  .sword{display:none}
}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg" id="sceneBg"></div>
</div>
<div class="bg-overlay"></div>
<div class="stars"></div>
<div class="mist"></div>
<div class="lightning"></div>
<canvas id="particles"></canvas>

<div class="swords-wrap" id="swordsWrap"></div>

<div class="main">
  <div class="clock-panel">
    <div class="clock" aria-live="polite">
      <span id="clockH">00</span><span class="sep">:</span><span id="clockM">00</span>
    </div>
    <div class="sec-line"><span id="clockS">00</span></div>
    <div class="rule"></div>
    <div class="date-line" id="dateDisplay">---</div>
  </div>

  <!-- center empty — swords are the star -->

  <div class="cal-wrap">
    <div class="cal-panel">
      <div id="calendar"></div>
    </div>
  </div>
</div>

<div class="brand">WANGLIN · 望林</div>

<script>
(function(){
  'use strict';
  const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)');
  if (prefersReduced.matches) return;

  // ==================== CLOCK + CALENDAR ====================
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                  'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const days   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const dow    = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  const $ = id => document.getElementById(id);
  let pm=-1,ph=-1;

  function renderCal(){
    const n=new Date(),y=n.getFullYear(),m=n.getMonth(),td=n.getDate();
    const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dip=new Date(y,m,0).getDate();
    let h='<div class="cal-header">'+months[m]+' <span class="cal-year">'+(y+543)+'</span></div><div class="cal-grid">';
    for(let d=0;d<7;d++)h+='<div class="cal-dow">'+dow[d]+'</div>';
    for(let d=dip-fd+1;d<=dip;d++)h+='<div class="cal-day other">'+d+'</div>';
    for(let d=1;d<=dim;d++)h+='<div class="cal-day'+(d===td?' today':'')+'">'+d+'</div>';
    const t=fd+dim;if(t%7>0)for(let d=1;d<=7-t%7;d++)h+='<div class="cal-day other">'+d+'</div>';
    h+='</div>';
    $('calendar').innerHTML=h;
  }

  function updateClock(){
    const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
    const hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0'),ss=String(s).padStart(2,'0');
    if(h!==ph||m!==pm){
      $('clockH').textContent=hh;
      $('clockM').textContent=mm;
      $('dateDisplay').innerHTML='<span class="num">'+days[n.getDay()]+'</span>ที่ <span class="num">'+n.getDate()+'</span> '+months[n.getMonth()]+' <span class="num">'+(n.getFullYear()+543)+'</span>';
      renderCal();
      ph=h;pm=m;
    }
    $('clockS').textContent=ss;
  }

  renderCal();
  updateClock();
  setInterval(updateClock,500);

  // ==================== LIGHTNING SVORDS (Jian) ====================
  const SWORD_COUNT = 9;
  const wrap = document.getElementById('swordsWrap');
  const swords = [];

  // Lightning jian SVG — green lightning blade
  const swordSVG = `
    <svg viewBox="0 0 20 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="jianBlade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#70e8b0" stop-opacity="0.80"/>
          <stop offset="20%" stop-color="#b0ffd0" stop-opacity="0.95"/>
          <stop offset="50%" stop-color="#50d890" stop-opacity="0.85"/>
          <stop offset="80%" stop-color="#30b870" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#209860" stop-opacity="0.5"/>
        </linearGradient>
        <linearGradient id="lightningEdge" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#80ffc0" stop-opacity="0.6"/>
          <stop offset="50%" stop-color="#40e890" stop-opacity="0"/>
          <stop offset="100%" stop-color="#80ffc0" stop-opacity="0.1"/>
        </linearGradient>
        <filter id="swordGlow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Lightning aura around blade -->
      <path d="M5,5 L3,15 L6,12 L2,30 L7,25 L3,45 L8,38 L4,55 L9,50"
            fill="none" stroke="rgba(60,255,160,0.04)" stroke-width="3" stroke-linecap="round"/>
      <path d="M15,5 L17,15 L14,12 L18,30 L13,25 L17,45 L12,38 L16,55 L11,50"
            fill="none" stroke="rgba(60,255,160,0.03)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Blade glow -->
      <rect x="5" y="2" width="10" height="80" rx="4" fill="url(#lightningEdge)"/>

      <!-- Main blade (double-edged straight sword) -->
      <path d="M9,0 L11,0 L11.5,75 L10,80 L8.5,75 Z" fill="url(#jianBlade)" filter="url(#swordGlow)"/>

      <!-- Blade edge highlight -->
      <path d="M9.5,2 L10,4 L10,72 L9.5,76 Z" fill="rgba(200,255,230,0.08)"/>

      <!-- Lightning bolt pattern on blade -->
      <path d="M8,15 L12,20 L7,25 L11,30 L6,35 L10,40 L5,45 L9,50 L4,55 L8,60 L5,65"
            fill="none" stroke="rgba(100,255,180,0.04)" stroke-width="0.6"/>

      <!-- Guard (tsuba) — traditional jian guard with lightning motif -->
      <path d="M4,79 L16,79 L15.5,82 L4.5,82 Z" fill="#1a2e22" stroke="rgba(60,220,140,0.10)" stroke-width="0.5"/>

      <!-- Handle -->
      <rect x="7" y="82" width="6" height="22" rx="1.5" fill="#0e1e14" stroke="rgba(60,220,140,0.03)" stroke-width="0.3"/>

      <!-- Cord wrapping on handle -->
      <line x1="7.5" y1="85" x2="12.5" y2="85" stroke="rgba(60,220,140,0.05)" stroke-width="0.6"/>
      <line x1="7.5" y1="89" x2="12.5" y2="89" stroke="rgba(60,220,140,0.05)" stroke-width="0.6"/>
      <line x1="7.5" y1="93" x2="12.5" y2="93" stroke="rgba(60,220,140,0.05)" stroke-width="0.6"/>
      <line x1="7.5" y1="97" x2="12.5" y2="97" stroke="rgba(60,220,140,0.05)" stroke-width="0.6"/>
      <line x1="7.5" y1="101" x2="12.5" y2="101" stroke="rgba(60,220,140,0.05)" stroke-width="0.6"/>

      <!-- Jade crystal pommel -->
      <circle cx="10" cy="106" r="3.5" fill="rgba(40,200,130,0.12)" stroke="rgba(60,220,140,0.08)" stroke-width="0.5"/>
      <circle cx="10" cy="106" r="1.5" fill="rgba(80,255,180,0.10)"/>

      <!-- Tassel (jian sui — sword tassel) -->
      <path d="M10,110 Q13,116 8,124" fill="none" stroke="rgba(40,200,130,0.06)" stroke-width="1.5"/>
      <path d="M10,110 Q6,117 12,125" fill="none" stroke="rgba(40,200,130,0.04)" stroke-width="1"/>
      <path d="M10,110 Q10,118 9,126" fill="none" stroke="rgba(40,200,130,0.03)" stroke-width="0.8"/>
    </svg>`;

  for (let i = 0; i < SWORD_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'sword';
    el.innerHTML = swordSVG;
    wrap.appendChild(el);
    swords.push({
      el,
      phase: (i / SWORD_COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.3,
      radius: 100 + Math.random() * 50,
      ox: 0, oy: 0,
      floatPhase: Math.random() * Math.PI * 2
    });
  }

  // ==================== MOUSE TRACKING ====================
  let mx = window.innerWidth / 2;
  let my = window.innerHeight / 2;
  let sx = mx, sy = my;

  // Parallax background
  const bg = document.getElementById('sceneBg');
  let bgIdleTimer;

  document.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;

    const px = (e.clientX / window.innerWidth - 0.5) * 20;
    const py = (e.clientY / window.innerHeight - 0.5) * 14;
    bg.style.transform = `translate(${px}px,${py}px) scale(1.04)`;

    clearTimeout(bgIdleTimer);
    bgIdleTimer = setTimeout(() => {
      bg.style.transform = `scale(1.04)`;
    }, 3000);
  }, { passive: true });

  // ==================== SVORD ANIMATION LOOP ====================
  function lerp(a, b, t) { return a + (b - a) * t; }

  function loop(){
    sx = lerp(sx, mx, 0.06);
    sy = lerp(sy, my, 0.06);

    const now = Date.now() * 0.001;

    for (let i = 0; i < swords.length; i++) {
      const s = swords[i];
      const angle = s.phase + now * 0.25;
      const pushOut = 1 + Math.sin(now * 0.4 + s.floatPhase) * 0.08;

      const r = s.radius * pushOut;
      const tx = sx + Math.cos(angle) * r;
      const ty = sy + Math.sin(angle) * r * 0.6;

      s.ox = lerp(s.ox, tx, 0.05);
      s.oy = lerp(s.oy, ty, 0.05);

      const outAngle = Math.atan2(s.oy - sy, s.ox - sx) * (180 / Math.PI) + 90;
      const wobble = Math.sin(now * 0.8 + s.floatPhase) * 2;
      const finalRot = outAngle + wobble + 270;

      s.el.style.transform = `translate(${s.ox - 10}px, ${s.oy - 65}px) rotate(${finalRot}deg)`;

      // Distance-based opacity — brighter when closer to center
      const distFromCenter = Math.sqrt(s.ox * s.ox + s.oy * s.oy);
      s.el.style.opacity = Math.min(1, 0.5 + 0.5 * (1 - Math.abs(s.ox - mx) / 600));
    }

    requestAnimationFrame(loop);
  }

  // ==================== PARTICLES (spiritual energy) ====================
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PARTICLE_COUNT = 50;
  const particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -(0.04 + Math.random() * 0.15),
      r: 1 + Math.random() * 2.5,
      alpha: 0.08 + Math.random() * 0.25,
      phase: Math.random() * Math.PI * 2,
      hue: 120 + Math.random() * 60
    });
  }

  // ==================== LIGHTNING BOLTS ====================
  const bolts = [];

  function spawnLightning(){
    if (Math.random() > 0.35) return;
    const x = Math.random() * W;
    const y = Math.random() * H * 0.2;
    const segments = 6 + Math.floor(Math.random() * 10);
    const points = [{x, y}];
    let cx = x, cy = y;
    for (let i = 0; i < segments; i++) {
      cx += (Math.random() - 0.5) * 50;
      cy += 15 + Math.random() * 30;
      points.push({x: cx, y: cy});
    }
    bolts.push({
      points,
      alpha: 0.12 + Math.random() * 0.18,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.025
    });
  }

  setInterval(spawnLightning, 2500);

  function drawScene(){
    ctx.clearRect(0, 0, W, H);

    // Draw particles
    for (const p of particles) {
      p.vy = lerp(p.vy, -(0.04 + p.r * 0.03), 0.01);
      p.vx += Math.sin(Date.now() * 0.001 + p.phase) * 0.002;

      p.x += p.vx;
      p.y += p.vy;

      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;

      if (mx !== undefined) {
        const dx = p.x - mx, dy = p.y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 80 && d > 0) {
          const force = (1 - d / 80) * 1.2;
          p.x += (dx / d) * force;
          p.y += (dy / d) * force;
        }
      }

      const flicker = 0.6 + 0.4 * Math.sin(Date.now() * 0.002 + p.phase);

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 60%, 65%, ${p.alpha * flicker})`;
      ctx.fill();

      if (p.r > 1.5) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 40%, 55%, ${p.alpha * flicker * 0.05})`;
        ctx.fill();
      }
    }

    // Draw lightning bolts
    for (let i = bolts.length - 1; i >= 0; i--) {
      const b = bolts[i];
      b.life -= b.decay;
      if (b.life <= 0) { bolts.splice(i, 1); continue; }

      ctx.beginPath();
      ctx.moveTo(b.points[0].x, b.points[0].y);
      for (let j = 1; j < b.points.length; j++) {
        const jx = b.points[j].x + (Math.random() - 0.5) * 3;
        const jy = b.points[j].y + (Math.random() - 0.5) * 3;
        ctx.lineTo(jx, jy);
      }
      ctx.strokeStyle = `rgba(100, 255, 180, ${b.alpha * b.life})`;
      ctx.lineWidth = 1.2 + b.life * 0.5;
      ctx.stroke();

      // Glow
      ctx.beginPath();
      ctx.moveTo(b.points[0].x, b.points[0].y);
      for (let j = 1; j < b.points.length; j++) {
        ctx.lineTo(b.points[j].x, b.points[j].y);
      }
      ctx.strokeStyle = `rgba(60, 220, 150, ${b.alpha * b.life * 0.25})`;
      ctx.lineWidth = 4 + b.life * 3;
      ctx.stroke();
    }

    requestAnimationFrame(drawScene);
  }

  // Start
  loop();
  drawScene();
})();
</script>
</body>
</html>
